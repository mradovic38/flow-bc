project: 'flow-bc'
program: train.py
method: grid
name: "Door-gaussian-bc"

parameters:
  policy:
    value: gaussian
  num-epochs:
    value: 1000
  batch-size:
    value: 128
  depth:
    value: 2
  hidden-dim:
    value: 512
  eval-interval:
    value: 50
  eval-episodes:
    value: 10
  env-name:
    value: D4RL/door/human-v2
  save-path:
    value: 'weights/door/gaussian_baseline.pt'
  lr:
    value: 0.0001
  seed:
    values: [1, 2, 3]