project: 'flow-bc'
program: train.py
method: grid
name: "HalfCheetah-gaussian-bc"

parameters:
  policy:
    value: gaussian
  num-epochs:
    value: 100
  batch-size:
    value: 512
  depth:
    value: 2
  hidden-dim:
    value: 256
  eval-interval:
    value: 5
  eval-episodes:
    value: 10
  env-name:
    value: mujoco/halfcheetah/medium-v0
  save-path:
    value: 'weights/halfcheetah/gaussian_baseline.pt'
  lr:
    value: 0.0003
  seed:
    values: [1, 2, 3]