project: 'flow-bc'
program: train.py
method: grid
name: "HalfCheetah-flow-matching-bc"

parameters:
  policy:
    value: flow-matching
  num-epochs:
    value: 100
  batch-size:
    value: 256
  depth:
    value: 2
  hidden-dim:
    value: 256
  eval-interval:
    value: 10
  eval-episodes:
    value: 10
  env-name:
    value: mujoco/halfcheetah/medium-v0
  save-path:
    value: 'weights/halfcheetah/flow-matching.pt'
  lr:
    value: 0.0002
  time-embedding-dim:
    value: 32
  ode-method:
    value: euler
  ode-steps:
    value: 20
  seed:
    values: [1, 2, 3]